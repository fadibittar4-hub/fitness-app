<div class="app-shell">
  <header class="top-nav">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <img src="/branding/strynth-logo-exact.png" alt="" />
      </span>
      <div class="brand-copy">
        <p class="brand-title">{{ title }}</p>
        <p class="brand-subtitle">Fitness Marketplace</p>
      </div>
    </div>
    <a class="ghost-action" routerLink="/discover">Explore</a>
  </header>

  <main class="content panel-base" role="main">
    <div class="content-inner">
      <router-outlet></router-outlet>
    </div>
  </main>

  <nav class="bottom-nav panel-glass" aria-label="Primary">
    <a
      *ngFor="let item of bottomNavItems"
      class="nav-link"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.route === '/' }"
    >
      {{ item.label }}
    </a>
  </nav>
</div>
