<div class="tp-page">
  <ng-container *ngIf="authService.currentUser() as user">
    <!-- Hero -->
    <div class="tp-hero panel-glass">
      <ui-avatar-upload
        [imageUrl]="user.profile_image_url"
        [initials]="user.first_name[0] + user.last_name[0]"
      />
      <div class="tp-hero__info">
        <h1 class="tp-hero__name">{{ user.first_name }} {{ user.last_name }}</h1>
        <p class="tp-hero__email">{{ user.email }}</p>
        <p class="tp-hero__role">{{ user.role }}</p>
      </div>
    </div>

    <!-- Bookings -->
    <section class="tp-section panel-glass">
      <h2 class="tp-section__title">My Bookings</h2>

      <p *ngIf="isLoadingBookings()" class="tp-state">Loading bookings…</p>

      <p *ngIf="!isLoadingBookings() && bookings().length === 0" class="tp-state">
        No bookings yet.
      </p>

      <ul *ngIf="!isLoadingBookings() && bookings().length > 0" class="tp-list">
        <li *ngFor="let b of bookings()" class="tp-item">
          <div class="tp-item__main">
            <p class="tp-item__label">
              {{ b.session.trainer_first_name }} {{ b.session.trainer_last_name }}
            </p>
            <p class="tp-item__sub">{{ b.session.session_time | date: 'medium' }}</p>
          </div>
          <div class="tp-item__actions">
            <span class="tp-badge" [class]="'tp-badge--' + b.status">{{ b.status }}</span>
          </div>
        </li>
      </ul>
    </section>

    <!-- Logout -->
    <div class="tp-logout">
      <button class="tp-logout-btn" type="button" (click)="logout()">Log out</button>
    </div>
  </ng-container>
</div>
