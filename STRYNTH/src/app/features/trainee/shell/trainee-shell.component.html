<div class="trainee-shell">
  <header class="ts-topbar">
    <div class="ts-topbar__brand">
      <img class="ts-topbar__logo" src="/branding/strynth-logo-exact.png" alt="STRYNTH" />
      <span class="ts-topbar__name">STRYNTH</span>
    </div>

    <!-- Desktop nav links inside top bar -->
    <nav class="ts-topbar__nav" aria-label="Trainee navigation">
      <a
        *ngFor="let item of navItems"
        class="ts-topbar__link"
        [routerLink]="item.route"
        routerLinkActive="active"
      >{{ item.label }}</a>
    </nav>

    <button class="ts-topbar__avatar" (click)="goToProfile()" aria-label="Profile">
      {{ authService.currentUser()?.first_name?.[0] ?? 'U' }}{{ authService.currentUser()?.last_name?.[0] ?? '' }}
    </button>
  </header>

  <main class="ts-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile bottom nav -->
  <nav class="ts-bottomnav" aria-label="Trainee navigation">
    <a
      *ngFor="let item of navItems"
      class="ts-bottomnav__link"
      [routerLink]="item.route"
      routerLinkActive="active"
    >{{ item.label }}</a>
  </nav>
</div>
