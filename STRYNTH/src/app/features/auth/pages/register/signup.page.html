<section class="auth-page">
  <header class="auth-brand panel-glass">
    <div class="auth-brand__halo" aria-hidden="true"></div>
    <img class="auth-brand__logo" src="/branding/strynth-logo-exact.png" alt="STRYNTH" />
    <p class="auth-brand__name">STRYNTH</p>
    <p class="auth-brand__tagline">Create your performance account</p>
  </header>

  <section class="auth-card surface-card">
    <h1 class="auth-card__title">Create account</h1>
    <p class="auth-card__subtitle">Choose your role and start booking or coaching.</p>

    <form #signupForm="ngForm" class="auth-form" novalidate (ngSubmit)="onSubmit(signupForm)">
      <fieldset class="role-select">
        <legend>Role</legend>
        <div class="role-select__options">
          <button
            type="button"
            class="role-option"
            [ngClass]="{ 'role-option--active': role() === 'client' }"
            (click)="setRole('client')"
          >
            Client
          </button>
          <button
            type="button"
            class="role-option"
            [ngClass]="{ 'role-option--active': role() === 'trainer' }"
            (click)="setRole('trainer')"
          >
            Trainer
          </button>
        </div>
      </fieldset>

      <div class="auth-form__split">
        <label class="auth-field">
          <span>First name</span>
          <input
            #firstNameRef="ngModel"
            class="auth-input"
            [ngClass]="{ 'auth-input--invalid': (firstNameRef.invalid && firstNameRef.touched) || (submitted() && firstNameRef.invalid) }"
            type="text"
            name="firstName"
            required
            autocomplete="given-name"
            [ngModel]="firstName()"
            (ngModelChange)="firstName.set($event)"
            placeholder="John"
          />
          <small class="auth-error" *ngIf="(firstNameRef.invalid && firstNameRef.touched) || (submitted() && firstNameRef.invalid)">
            First name is required.
          </small>
        </label>

        <label class="auth-field">
          <span>Last name</span>
          <input
            #lastNameRef="ngModel"
            class="auth-input"
            [ngClass]="{ 'auth-input--invalid': (lastNameRef.invalid && lastNameRef.touched) || (submitted() && lastNameRef.invalid) }"
            type="text"
            name="lastName"
            required
            autocomplete="family-name"
            [ngModel]="lastName()"
            (ngModelChange)="lastName.set($event)"
            placeholder="Doe"
          />
          <small class="auth-error" *ngIf="(lastNameRef.invalid && lastNameRef.touched) || (submitted() && lastNameRef.invalid)">
            Last name is required.
          </small>
        </label>
      </div>

      <label class="auth-field">
        <span>Email</span>
        <input
          #emailRef="ngModel"
          class="auth-input"
          [ngClass]="{ 'auth-input--invalid': (emailRef.invalid && emailRef.touched) || (submitted() && emailRef.invalid) }"
          type="email"
          name="email"
          required
          email
          autocomplete="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          placeholder="you@example.com"
        />
        <small class="auth-error" *ngIf="(emailRef.invalid && emailRef.touched) || (submitted() && emailRef.invalid)">
          Enter a valid email address.
        </small>
      </label>

      <label class="auth-field">
        <span>Password</span>
        <input
          #passwordRef="ngModel"
          class="auth-input"
          [ngClass]="{
            'auth-input--invalid': (passwordRef.invalid && passwordRef.touched) || (submitted() && passwordRef.invalid)
          }"
          type="password"
          name="password"
          required
          minlength="8"
          autocomplete="new-password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          placeholder="Create a password"
        />
        <small
          class="auth-error"
          *ngIf="(passwordRef.invalid && passwordRef.touched) || (submitted() && passwordRef.invalid)"
        >
          Password must be at least 8 characters.
        </small>
      </label>

      <p *ngIf="errorMessage()" class="auth-error auth-error--banner">{{ errorMessage() }}</p>

      <ui-button variant="primary" size="lg" [fullWidth]="true" type="submit" [disabled]="isLoading()">
        {{ isLoading() ? 'Creating account…' : 'Create Account' }}
      </ui-button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>
  </section>
</section>
