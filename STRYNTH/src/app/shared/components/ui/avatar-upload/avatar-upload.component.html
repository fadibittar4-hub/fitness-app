<div class="au-wrap" [class.au-wrap--uploading]="isUploading()">
  <img *ngIf="imageUrl() | mediaUrl as src" [src]="src" class="au-avatar au-avatar--photo" alt="Profile photo" />
  <span *ngIf="!(imageUrl() | mediaUrl)" class="au-avatar">{{ initials() }}</span>
  <label class="au-edit" aria-label="Change profile photo">
    <input class="au-input" type="file" accept="image/jpeg,image/png,image/webp" [disabled]="isUploading()" (change)="onFileChange($event)" />
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  </label>
</div>
<p *ngIf="uploadError()" class="au-error">{{ uploadError() }}</p>
