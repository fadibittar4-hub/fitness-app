<section class="auth-page">
  <header class="auth-brand panel-glass">
    <div class="auth-brand__halo" aria-hidden="true"></div>
    <img class="auth-brand__logo" src="/branding/strynth-logo-exact.png" alt="STRYNTH" />
    <p class="auth-brand__name">STRYNTH</p>
    <p class="auth-brand__tagline">Premium Fitness Marketplace</p>
  </header>

  <section class="auth-card surface-card">
    <h1 class="auth-card__title">Welcome back</h1>
    <p class="auth-card__subtitle">Log in to continue your training journey.</p>

    <form #loginForm="ngForm" class="auth-form" novalidate (ngSubmit)="onSubmit(loginForm)">
      <label class="auth-field">
        <span>Email</span>
        <input
          #emailRef="ngModel"
          class="auth-input"
          [ngClass]="{ 'auth-input--invalid': (emailRef.invalid && emailRef.touched) || (submitted() && emailRef.invalid) }"
          type="email"
          name="email"
          required
          email
          autocomplete="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          placeholder="you@example.com"
        />
        <small class="auth-error" *ngIf="(emailRef.invalid && emailRef.touched) || (submitted() && emailRef.invalid)">
          Enter a valid email address.
        </small>
      </label>

      <label class="auth-field">
        <span>Password</span>
        <input
          #passwordRef="ngModel"
          class="auth-input"
          [ngClass]="{
            'auth-input--invalid': (passwordRef.invalid && passwordRef.touched) || (submitted() && passwordRef.invalid)
          }"
          type="password"
          name="password"
          required
          minlength="8"
          autocomplete="current-password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          placeholder="Enter your password"
        />
        <small
          class="auth-error"
          *ngIf="(passwordRef.invalid && passwordRef.touched) || (submitted() && passwordRef.invalid)"
        >
          Password must be at least 8 characters.
        </small>
      </label>

      <p *ngIf="errorMessage()" class="auth-error auth-error--banner">{{ errorMessage() }}</p>

      <ui-button variant="primary" size="lg" [fullWidth]="true" type="submit" [disabled]="isLoading()">
        {{ isLoading() ? 'Logging in…' : 'Log In' }}
      </ui-button>
    </form>

    <p class="auth-footer">
      New to STRYNTH?
      <a routerLink="/signup">Create account</a>
    </p>
  </section>
</section>
