<div class="au-page">
  <h1 class="au-title">All Users</h1>

  <p *ngIf="isLoading()" class="au-state">Loading…</p>
  <p *ngIf="error()" class="au-error">{{ error() }}</p>
  <p *ngIf="!isLoading() && users().length === 0" class="au-state">No users found.</p>

  <ul *ngIf="!isLoading() && users().length > 0" class="au-list">
    <li *ngFor="let u of users()" class="au-item panel-glass">

      <!-- View mode -->
      <ng-container *ngIf="editingId() !== u.id">
        <div class="au-item__avatar">{{ u.first_name[0] }}{{ u.last_name[0] }}</div>
        <div class="au-item__info">
          <p class="au-item__name">{{ u.first_name }} {{ u.last_name }}</p>
          <p class="au-item__email">{{ u.email }}</p>
        </div>
        <span class="au-badge" [class]="'au-badge--' + u.role">{{ u.role }}</span>
        <button type="button" class="au-edit-btn" (click)="startEdit(u)">Edit</button>
      </ng-container>

      <!-- Edit mode -->
      <form *ngIf="editingId() === u.id" #editForm="ngForm" class="au-edit-form" (ngSubmit)="saveEdit(editForm)">
        <div class="au-edit-form__row">
          <div class="au-edit-form__field">
            <label class="au-edit-form__label">First name</label>
            <input class="au-edit-form__input" type="text" name="firstName" required
              [ngModel]="editFirstName()" (ngModelChange)="editFirstName.set($event)" />
          </div>
          <div class="au-edit-form__field">
            <label class="au-edit-form__label">Last name</label>
            <input class="au-edit-form__input" type="text" name="lastName" required
              [ngModel]="editLastName()" (ngModelChange)="editLastName.set($event)" />
          </div>
        </div>

        <div class="au-edit-form__field">
          <label class="au-edit-form__label">Email</label>
          <input class="au-edit-form__input" type="email" name="email" required
            [ngModel]="editEmail()" (ngModelChange)="editEmail.set($event)" />
        </div>

        <div class="au-edit-form__field">
          <label class="au-edit-form__label">Role</label>
          <select class="au-edit-form__input au-edit-form__select" name="role" required
            [ngModel]="editRole()" (ngModelChange)="editRole.set($event)">
            <option value="member">member</option>
            <option value="trainer">trainer</option>
            <option value="admin">admin</option>
          </select>
        </div>

        <ng-container *ngIf="editRole() === 'trainer'">
          <div class="au-edit-form__field">
            <label class="au-edit-form__label">Description</label>
            <input class="au-edit-form__input" type="text" name="description"
              [ngModel]="editDescription()" (ngModelChange)="editDescription.set($event)" />
          </div>
          <div class="au-edit-form__field">
            <label class="au-edit-form__label">Specialties</label>
            <input class="au-edit-form__input" type="text" name="specialties"
              [ngModel]="editSpecialties()" (ngModelChange)="editSpecialties.set($event)" />
          </div>
          <div class="au-edit-form__field">
            <label class="au-edit-form__label">Years of experience</label>
            <input class="au-edit-form__input" type="number" name="yearsExperience" min="0"
              [ngModel]="editYearsExperience()" (ngModelChange)="editYearsExperience.set($event)" />
          </div>
        </ng-container>

        <p *ngIf="saveError()" class="au-error">{{ saveError() }}</p>

        <div class="au-edit-form__actions">
          <button type="submit" class="au-save-btn" [disabled]="isSaving()">
            {{ isSaving() ? 'Saving…' : 'Save' }}
          </button>
          <button type="button" class="au-cancel-btn" (click)="cancelEdit()">Cancel</button>
        </div>
      </form>

    </li>
  </ul>
</div>
