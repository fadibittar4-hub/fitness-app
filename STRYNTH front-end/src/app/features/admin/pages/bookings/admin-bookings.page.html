<div class="ab-page">
  <h1 class="ab-title">All Bookings</h1>

  <p *ngIf="isLoading()" class="ab-state">Loading…</p>
  <p *ngIf="error()" class="ab-error">{{ error() }}</p>
  <p *ngIf="!isLoading() && bookings().length === 0" class="ab-state">No bookings found.</p>

  <ul *ngIf="!isLoading() && bookings().length > 0" class="ab-list">
    <li *ngFor="let b of bookings()" class="ab-item panel-glass">
      <div class="ab-item__row">
        <span class="ab-item__name">{{ b.user_first_name }} {{ b.user_last_name }}</span>
        <span class="ab-badge" [class]="'ab-badge--' + b.status">{{ b.status }}</span>
      </div>
      <p class="ab-item__session">
        {{ b.session.trainer_first_name }} {{ b.session.trainer_last_name }} —
        {{ b.session.session_time | date: 'medium' }}
      </p>
      <p class="ab-item__date">Booked {{ b.created_at | date: 'mediumDate' }}</p>
    </li>
  </ul>
</div>
