<article
  class="trainer-card surface-card surface-card--interactive"
  role="button"
  tabindex="0"
  [attr.aria-label]="'View profile for ' + name"
  (click)="onCardClick()"
  (keydown.enter)="onCardClick()"
  (keydown.space)="$event.preventDefault(); onCardClick()"
>
  <div class="trainer-card__media">
    <img *ngIf="imageUrl; else placeholder" [src]="imageUrl" [alt]="name" class="trainer-card__image" />

    <ng-template #placeholder>
      <div class="trainer-card__placeholder">
        <span>{{ name.charAt(0) }}</span>
      </div>
    </ng-template>
  </div>

  <div class="trainer-card__body">
    <div class="trainer-card__badges" *ngIf="badge || verified || sessionMode">
      <ui-badge *ngIf="badge" class="trainer-card__badge" [label]="badge"></ui-badge>
      <ui-badge *ngIf="verified" class="trainer-card__badge" tone="success" label="Verified"></ui-badge>
      <ui-badge *ngIf="sessionMode" class="trainer-card__badge" tone="neutral" [label]="sessionMode"></ui-badge>
    </div>

    <div class="trainer-card__identity">
      <h3 class="trainer-card__name">{{ name }}</h3>
      <p class="trainer-card__specialty">{{ specialty }}</p>
    </div>

    <p class="trainer-card__location">{{ location }}</p>

    <div class="trainer-card__meta">
      <div class="trainer-card__rating">
        <ui-rating-stars [rating]="rating"></ui-rating-stars>
        <span class="trainer-card__reviews">{{ reviewCount }} reviews</span>
      </div>

      <p class="trainer-card__price">{{ price }}<span>{{ sessionLabel }}</span></p>
    </div>

    <ui-button class="trainer-card__cta" variant="primary" size="md" [fullWidth]="true" (click)="onBookNow($event)">
      {{ ctaLabel }}
    </ui-button>
  </div>
</article>
