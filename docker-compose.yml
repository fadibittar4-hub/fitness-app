services:

  # ── Node.js / Express backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./STRYNTH Back-end
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT:       5000
      DB_HOST:    host.docker.internal
      DB_PORT:    ${DB_PORT}
      DB_NAME:    ${DB_NAME}
      DB_USER:    ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV:   production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Bind-mount the local uploads folder so existing images are available
      - ./STRYNTH Back-end/uploads:/app/uploads
    ports:
      - "5000:5000"

  # ── Angular frontend (nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./STRYNTH front-end
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

