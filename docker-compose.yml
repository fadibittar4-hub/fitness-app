services:

  # ── MySQL 8 database ────────────────────────────────────────────────────────
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      # Auto-apply schema on first run
      - ./STRYNTH Back-end/database/schema.mysql.sql:/docker-entrypoint-initdb.d/schema.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js / Express backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./STRYNTH Back-end
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:        5000
      DB_HOST:     db
      DB_PORT:     3306
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
      NODE_ENV:    production
    volumes:
      - ./STRYNTH Back-end/uploads:/app/uploads
    ports:
      - "5000:5000"

  # ── Angular frontend (nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./STRYNTH front-end
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:

